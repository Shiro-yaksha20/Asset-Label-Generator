<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Asset Label Generator</title>
        <meta
            name="description"
            content="Generate printable asset labels with QR codes directly in the browser."
        />
        <link rel="icon" type="image/svg+xml" href="assets/app-icon.svg" />
        <link rel="stylesheet" href="css/style.css" />

        <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
        <noscript>
            <p style="padding: 20px; font-family: sans-serif; color: #b91c1c">
                This app requires JavaScript to run. Please enable JavaScript in
                your browser.
            </p>
        </noscript>
        <script>
            window.addEventListener("error", function (e) {
                if (e && e.tagName === "SCRIPT") {
                    var note = document.createElement("p");
                    note.style.cssText =
                        "padding:16px;font-family:sans-serif;color:#b91c1c;background:#fef2f2;border-bottom:1px solid #fecaca";
                    note.textContent =
                        "A required library failed to load. Please check your internet connection and reload.";
                    document.body.prepend(note);
                }
            });
        </script>
    </head>
    <body>
        <header class="app-header">
            <div class="app-brand">
                <img
                    class="app-brand-icon"
                    src="assets/app-icon.svg"
                    alt=""
                    aria-hidden="true"
                />
                <div class="app-brand-copy">
                    <h1>Asset Label Generator</h1>
                    <p>Browser-based label generation for GitHub Pages</p>
                </div>
            </div>
        </header>

        <main class="app-main">
            <aside class="sidebar" aria-label="Settings">
                <div class="field-group">
                    <label for="assetFile">Asset data file</label>
                    <input
                        id="assetFile"
                        type="file"
                        accept=".csv,.xlsx,.xls"
                    />
                </div>

                <div class="field-group">
                    <label for="logoFile">Logo file</label>
                    <input id="logoFile" type="file" accept="image/png" />
                </div>

                <div class="field-group">
                    <label for="qrLink">QR link</label>
                    <input
                        id="qrLink"
                        type="url"
                        placeholder="https://example.com/assets"
                    />
                </div>

                <div class="field-group">
                    <label for="companyName">Company name</label>
                    <input
                        id="companyName"
                        type="text"
                        placeholder="Company name"
                    />
                </div>

                <div class="field-group">
                    <label for="footerText">Footer text</label>
                    <input
                        id="footerText"
                        type="text"
                        placeholder="Property of Company — Do Not Remove"
                    />
                </div>

                <div class="field-group">
                    <label for="labelSize">Label size</label>
                    <select id="labelSize">
                        <option value="extra-small">
                            Extra Small (38 × 19 mm)
                        </option>
                        <option value="small" selected>
                            Small (50 × 25 mm)
                        </option>
                        <option value="medium">Medium (63 × 38 mm)</option>
                        <option value="large">Large (100 × 50 mm)</option>
                        <option value="a4-full">
                            A4 Full Page (210 × 297 mm)
                        </option>
                        <option value="a3-full">
                            A3 Full Page (297 × 420 mm)
                        </option>
                        <option value="custom">Custom</option>
                    </select>
                </div>

                <div
                    id="customSizeInputs"
                    class="field-group custom-size hidden"
                >
                    <label for="customWidth">Custom width (mm)</label>
                    <input
                        id="customWidth"
                        type="number"
                        min="1"
                        step="0.1"
                        value="50"
                    />

                    <label for="customHeight">Custom height (mm)</label>
                    <input
                        id="customHeight"
                        type="number"
                        min="1"
                        step="0.1"
                        value="25"
                    />
                </div>

                <div class="field-group">
                    <label for="sheetSize">Sheet size</label>
                    <select id="sheetSize">
                        <option value="A4" selected>A4 (210 × 297 mm)</option>
                        <option value="A3">A3 (297 × 420 mm)</option>
                    </select>
                </div>

                <fieldset
                    class="field-group toggle-group"
                    style="border: none; padding: 0; margin: 0"
                >
                    <legend
                        style="
                            font-size: 0.9rem;
                            font-weight: 600;
                            margin-bottom: 4px;
                        "
                    >
                        Label sections
                    </legend>
                    <label>
                        <input id="showCompanyName" type="checkbox" />
                        Show company name text
                    </label>
                    <label>
                        <input id="showDetails" type="checkbox" />
                        Show details row
                    </label>
                    <label>
                        <input id="showFooter" type="checkbox" />
                        Show footer text
                    </label>
                </fieldset>

                <div
                    id="warningBox"
                    class="warning-box"
                    aria-live="polite"
                ></div>
            </aside>

            <section class="preview" aria-label="Live preview">
                <div class="preview-nav">
                    <button
                        id="prevLabel"
                        type="button"
                        aria-label="Previous label"
                    >
                        &lt;
                    </button>
                    <p id="previewCount">Showing label 0 of 0</p>
                    <button
                        id="nextLabel"
                        type="button"
                        aria-label="Next label"
                    >
                        &gt;
                    </button>
                </div>

                <p id="labelDimensions" class="label-dimensions">
                    Label: 50 × 25 mm
                </p>

                <div id="previewViewport" class="preview-viewport">
                    <div id="previewCanvas" class="preview-canvas"></div>
                </div>

                <div class="export-actions">
                    <button id="exportPdf" type="button">Export PDF</button>
                    <button id="exportPng" type="button">Export PNG</button>
                </div>
            </section>
        </main>

        <script src="js/data.js"></script>
        <script src="js/qr.js"></script>
        <script src="js/label.js"></script>
        <script src="js/sheet.js"></script>
        <script src="js/export.js"></script>
        <script src="js/app.js"></script>
    </body>
</html>
